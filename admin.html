<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Catálogo de Games</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navegação do Admin -->
    <nav class="navbar" style="background-color: #111;">
        <div class="nav-container">
            <a href="admin.html" class="logo" style="color: #ff4757;">⚙️ Painel ADM</a>
            <ul class="nav-links">
                <li><a href="admin.html" class="active">Dashboard</a></li>
                <li><a href="index.html">Ver Site</a></li>
                <li><a href="index.html" class="btn-login" style="color: #ff4757;">Sair</a></li>
            </ul>
        </div>
    </nav>

    <!-- Conteúdo Principal -->
    <main>
        <div class="admin-header">
            <h2>Bem-vindo, Administrador</h2>
            <p style="color: var(--text-secondary);">Aqui você pode gerenciar o catálogo de jogos.</p>
        </div>

        <section class="games-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h3 style="color: var(--accent-color);">Jogos Cadastrados</h3>
            </div>

            <!-- Tabela dinâmica -->
            <div class="admin-table">
                <div class="admin-table-row admin-table-header">
                    <div class="col">ID</div>
                    <div class="col">Título</div>
                    <div class="col">Gênero</div>
                    <div class="col">Ações</div>
                </div>
                
                <div id="admin-table-body">
                    <!-- Linhas injetadas via JS -->
                </div>
            </div>
        </section>

        <!-- Modal de Edição -->
        <div id="edit-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <h3 style="color: var(--accent-color); margin-bottom: 1rem;">Editar Jogo</h3>
                <form id="edit-form">
                    <div class="form-group">
                        <label>Título</label>
                        <input type="text" id="edit-title" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Gênero</label>
                        <input type="text" id="edit-genre" class="form-control" required>
                    </div>
                    <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                        <button type="button" class="btn-submit" style="background-color: var(--border-color); color: var(--text-color);" onclick="closeEditModal()">Cancelar</button>
                        <button type="submit" class="btn-submit">Salvar Alterações</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 GameCatalog. Área Restrita.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
